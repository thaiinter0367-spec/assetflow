name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  ci:
    name: CI Pipeline
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci --legacy-peer-deps

      - name: Validate Prisma Schema
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/db
        run: |
          cd frontend
          npx prisma validate

      - name: Run Lint
        run: |
          cd frontend
          npm run lint

      - name: Build App
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/db
          JWT_SECRET: ci-test-secret-key-1234567890
          JWT_EXPIRES_IN: 1d
        run: |
          cd frontend
          npm run build
